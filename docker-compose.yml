services:
  # Local S3-compatible object store
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The agent container image (built once, launched per step by the router)
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    image: workflow-agent:local
    # This service exists only to build the image.
    # The router launches actual containers from this image via docker.
    entrypoint: ["echo", "Image built successfully"]

volumes:
  minio-data:
