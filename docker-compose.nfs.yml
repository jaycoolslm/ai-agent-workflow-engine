services:
  # Local S3-compatible object store (still needed for S3 API fallback)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # NFS server to simulate S3 Files NFS mount locally
  nfs-server:
    image: itsthenetwork/nfs-server-alpine:latest
    privileged: true
    environment:
      SHARED_DIRECTORY: /data
    ports:
      - "2049:2049"
    volumes:
      - nfs-data:/data

  # The agent container image (built once, launched per step by the router)
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    image: workflow-agent:local
    # This service exists only to build the image.
    entrypoint: ["echo", "Image built successfully"]

  # Agent with NFS mount enabled
  agent-nfs:
    build:
      context: .
      dockerfile: Dockerfile.agent
    image: workflow-agent:local
    environment:
      - STORAGE_BACKEND=nfs
      - NFS_MOUNT_PATH=/mnt/s3
      - BUCKET=workflows
    volumes:
      - nfs-data:/mnt/s3
    depends_on:
      - nfs-server
    entrypoint: ["echo", "NFS agent image built successfully"]

volumes:
  minio-data:
  nfs-data:
